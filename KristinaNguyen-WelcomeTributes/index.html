<!DOCTYPE html>
<html>
  <head>

    <a-scene>
      <a-entity sound="src: assets/audio.mp3 ; autoplay: true; loop: true; volume: 1"></a-entity>

      <a-assets>
        <img id="sky1" src="assets/sky1.jpg">

      <!-- sky  -->
      <a-sky src="#sky1" radius="40"></a-sky>


      <a-box src ="assets/gold.avif"  position="0 0.25 -4" width="8" height="1" depth="5" ></a-box>
      
      
      <!-- Temple center -->
      <a-cone src ="assets/blue.avif"  position="0 3.8 -4" radius-bottom="1.2" radius-top="0.05" height="6.7" ></a-cone>



<!-- 3d models -->
<a-entity
  gltf-model="assets/barrel.glb"

</a-entity>
<a-entity
  gltf-model="assets/barrel.glb"
